name: Send Hot Game Screenshot

on:
  schedule:
    - cron: '0 2 * * *'  # 每天时间（UTC）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright node-fetch form-data

      - name: Run script
        run: node send.js
